<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deshi-Deals | Home</title>
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body>
    <header class="shadow">
      <nav class="">
        <div class="logo flex justify-center items-center gap-2 h-28">
            <img src="assets/logo.png" alt="Deshi-Deals Logo" class="w-18">
            <div class="">
                <h2 class="text-[#e71580] text-4xl ">Deshi <span class="font-bold ">Deals</span></h2>
                <p class="text-[#797075] text-xl">Cheap Price , Best Quality</p>
            </div>
        </div>
      </nav>
    </header>
    <main>
        <section id="banner"></section>
        <section id="products-container" class="w-11/12 mx-auto py-10 grid grid-cols-12 gap-8">
            <section id="product-box" class="bg-yellow-100 col-span-9">
                <div>
                    <h1 class="text-2xl font-bold"></h1>
                </div>
            </section>
            <aside id="cart-box"></aside>
        </section>
    </main>
    <footer>

    </footer>
</body>
</html>
